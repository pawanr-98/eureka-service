name: Deploy to ECS

on:
  workflow_dispatch: 
 # push:
 #    branches:
 #      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: test

    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build Docker image
      run: |
        docker build -t ${{ secrets.ECR_REPOSITORY }}:${{ github.run_number }} .
        docker tag ${{ secrets.ECR_REPOSITORY }}:${{ github.run_number }} ${{ secrets.ECR_REPOSITORY }}:latest
        
    - name: Tag image for ECR
      run: |
        docker tag ${{ secrets.ECR_REPOSITORY }}:${{ github.run_number }} \
        ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.run_number }}
    
        docker tag ${{ secrets.ECR_REPOSITORY }}:latest \
        ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest
    
    - name: Push images
      run: |
        docker push ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.run_number }}
        docker push ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest

    - name: Deploy to ECS
      uses: aws-actions/amazon-ecs-deploy-task-definition@v1
      with:
        task-definition: ecs-task-defination.json
        service: api-gateway-td-service-1
        cluster: test-01
        wait-for-service-stability: true
